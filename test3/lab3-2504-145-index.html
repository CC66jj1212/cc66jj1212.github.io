<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>数字展销平台</title>
    <link rel="stylesheet" href="css/lab3-2504-145-index.css">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 弹窗基础样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }
        .modal-content {
            width: 400px;
            background: #fff;
            margin: 100px auto;
            padding: 30px;
            border-radius: 8px;
            position: relative;
        }
        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 20px;
            cursor: pointer;
        }
        .tab {
            display: flex;
            margin-bottom: 20px;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            border-bottom: 2px solid #eee;
        }
        .tab-item.active {
            border-color: #ff6347;
            color: #ff6347;
            font-weight: bold;
        }
        .form-item {
            margin-bottom: 15px;
        }
        .form-item label {
            display: block;
            margin-bottom: 5px;
        }
        .form-item input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn {
            width: 100%;
            height: 40px;
            background: #ff6347;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        .form-box {
            display: none;
        }
        .form-box.show {
            display: block;
        }
        /* 头部右侧登录按钮 */
        .header-right {
            float: right;
        }
        .header-right a {
            color: #fff;
            text-decoration: none;
            margin-left: 15px;
        }
        .tip {
            color: #ff4500;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- 1. 头部区域 -->
    <header class="header">
        <nav class="nav-menu">
            <ul>
                <li><a href="#" class="active">首页</a></li>
                <li><a href="#">推荐</a></li>
                <li><a href="#">排行</a></li>
                <li><a href="#">订单</a></li>
                <li><a href="#">我的</a></li>
            </ul>
            <div class="header-right">
                <a href="javascript:;" id="loginBtn">登录 / 注册</a>
            </div>
        </nav>
    </header>

    <!-- 登录注册弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close" id="close">&times;</span>
            <div class="tab">
                <div class="tab-item active" data-target="loginForm">登录</div>
                <div class="tab-item" data-target="regForm">注册</div>
            </div>

            <!-- 登录表单 -->
            <div class="form-box show" id="loginForm">
                <div class="form-item">
                    <label>用户名</label>
                    <input type="text" id="loginUser" placeholder="请输入用户名">
                </div>
                <div class="form-item">
                    <label>密码</label>
                    <input type="password" id="loginPwd" placeholder="请输入密码">
                </div>
                <div class="tip" id="loginTip"></div>
                <button class="btn" id="loginSubmit">登录</button>
            </div>

            <!-- 注册表单 -->
            <div class="form-box" id="regForm">
                <div class="form-item">
                    <label>用户名</label>
                    <input type="text" id="regUser" placeholder="请设置用户名">
                </div>
                <div class="form-item">
                    <label>密码</label>
                    <input type="password" id="regPwd" placeholder="请设置密码">
                </div>
                <div class="tip" id="regTip"></div>
                <button class="btn" id="regSubmit">注册</button>
            </div>
        </div>
    </div>

    <!-- 2. 主体容器 (三栏布局) -->
    <div class="container">
        <!-- 左侧栏：图书分类 -->
        <aside class="sidebar-left">
            <h3><i class="fa-solid fa-list"></i> 图书分类</h3>
            <ul>
                <li>文学小说</li>
                <li>科学技术</li>
                <li>儿童读物</li>
                <li>艺术设计</li>
            </ul>
        </aside>

        <!-- 中间栏：核心内容 -->
        <main class="content">
            <!-- 热门推荐 -->
            <section class="recommend">
                <h2><i class="fa-solid fa-fire-flame-curved"></i> 热门推荐</h2>
                <div class="book-list">
                    <div class="book-item">
                        <img src="images/ylylbs.jpg" alt="月亮与六便士">
                        <p class="book-name">月亮与六便士</p>
                        <p class="book-author">毛姆</p>
                        <p class="book-price">¥15.00</p>
                    </div>
                    <div class="book-item">
                        <img src="images/sstt.jpg" alt="四世同堂">
                        <p class="book-name">四世同堂</p>
                        <p class="book-author">老舍</p>
                        <p class="book-price">¥14.00</p>
                    </div>
                    <div class="book-item">
                        <img src="images/hz.jpg" alt="活着">
                        <p class="book-name">活着</p>
                        <p class="book-author">余华</p>
                        <p class="book-price">¥16.00</p>
                    </div>
                </div>
            </section>

            <!-- 新书上市 -->
            <section class="new-book">
                <h2><i class="fa-solid fa-box-archive"></i> 新书上市</h2>
                <table>
                    <thead>
                        <tr>
                            <th>书名</th>
                            <th>作者</th>
                            <th>价格</th>
                            <th>评分</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>阿勒泰的角落</td>
                            <td>李娟</td>
                            <td>¥8.00</td>
                            <td>9.3</td>
                        </tr>
                        <tr>
                            <td>瓦尔登湖</td>
                            <td>梭罗</td>
                            <td>¥9.00</td>
                            <td>9.2</td>
                        </tr>
                        <tr>
                            <td>百年孤独</td>
                            <td>加夫列尔·加西亚·马尔克斯</td>
                            <td>¥8.00</td>
                            <td>9.0</td>
                        </tr>
                        <tr>
                            <td>战争与和平</td>
                            <td>列夫·托尔斯泰</td>
                            <td>¥12.00</td>
                            <td>9.5</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>

        <!-- 右侧栏：促销活动 -->
        <aside class="sidebar-right">
            <h3><i class="fa-solid fa-gift"></i> 促销活动</h3>
            <div class="promo-item">
                <h4>满减优惠</h4>
                <p>消费满50减10</p>
            </div>
        </aside>
    </div>
    <script>
        const loginBtn = document.getElementById('loginBtn');
        const modal = document.getElementById('modal');
        const close = document.getElementById('close');
        const tabItems = document.querySelectorAll('.tab-item');
        const formBoxs = document.querySelectorAll('.form-box');
        const regSubmit = document.getElementById('regSubmit');
        const loginSubmit = document.getElementById('loginSubmit');
        const loginTip = document.getElementById('loginTip');
        const regTip = document.getElementById('regTip');
        loginBtn.onclick = function () {
            modal.style.display = 'block';
        }

        close.onclick = function () {
            modal.style.display = 'none';
            clearTips();
        }
        tabItems.forEach(item => {
            item.onclick = function () {
                const target = this.dataset.target;
                tabItems.forEach(t => t.classList.remove('active'));
                formBoxs.forEach(f => f.classList.remove('show'));
                this.classList.add('active');
                document.getElementById(target).classList.add('show');
                clearTips();
            }
        })
        function clearTips() {
            loginTip.style.display = 'none';
            regTip.style.display = 'none';
        }
        regSubmit.onclick = function () {
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPwd').value.trim();
            if (!username || !password) {
                regTip.innerText = '用户名和密码不能为空！';
                regTip.style.display = 'block';
                return;
            }
            const user = localStorage.getItem('user_' + username);
            if (user) {
                regTip.innerText = '用户名已存在！';
                regTip.style.display = 'block';
                return;
            }
            localStorage.setItem('user_' + username, password);
            regTip.style.color = 'green';
            regTip.innerText = '注册成功！请登录';
            regTip.style.display = 'block';
            document.getElementById('regUser').value = '';
            document.getElementById('regPwd').value = '';
        }
        loginSubmit.onclick = function () {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPwd').value.trim();
            if (!username || !password) {
                loginTip.innerText = '用户名和密码不能为空！';
                loginTip.style.display = 'block';
                return;
            }
            const localPwd = localStorage.getItem('user_' + username);
            if (!localPwd) {
                loginTip.innerText = '该用户未注册！';
                loginTip.style.display = 'block';
                return;
            }
            if (localPwd !== password) {
                loginTip.innerText = '密码错误！';
                loginTip.style.display = 'block';
                return;
            }
            alert('登录成功！欢迎你，' + username);
            modal.style.display = 'none';
            loginBtn.innerText = '欢迎，' + username;
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPwd').value = '';
            clearTips();
        }
    </script>
</body>
</html>
